<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OpenComputer dashboard</title>
  <style>
    /* Phase 8.A: zero-build CSS. Phase 8.C will replace with proper
       Tailwind/shadcn — that's a separate frontend project. */
    html, body { margin: 0; padding: 0; height: 100%; background: #111; color: #ddd;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    body { display: flex; flex-direction: column; }
    header { padding: 12px 20px; border-bottom: 1px solid #333; display: flex;
      gap: 1em; align-items: center; }
    header .dot { width: 10px; height: 10px; border-radius: 50%; background: #888; }
    header .dot.up { background: #4ade80; }
    header .dot.down { background: #ef4444; }
    main { flex: 1; display: grid; grid-template-columns: 220px 1fr; min-height: 0; }
    aside { border-right: 1px solid #333; overflow-y: auto; padding: 12px; }
    aside h2 { font-size: 12px; text-transform: uppercase; color: #888;
      margin: 0 0 8px; letter-spacing: 0.05em; }
    aside ul { list-style: none; margin: 0; padding: 0; font-size: 13px; }
    aside li { padding: 6px 8px; border-radius: 4px; cursor: pointer; }
    aside li:hover { background: #222; }
    section.chat { display: flex; flex-direction: column; min-height: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 16px 20px; font-size: 14px;
      line-height: 1.5; }
    .messages .turn { margin-bottom: 14px; }
    .messages .role { font-size: 11px; text-transform: uppercase; color: #888;
      margin-bottom: 4px; letter-spacing: 0.05em; }
    .messages .role.user { color: #93c5fd; }
    .messages .role.assistant { color: #4ade80; }
    .messages pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    form { display: flex; border-top: 1px solid #333; padding: 12px; gap: 8px; }
    input[type=text] { flex: 1; background: #1a1a1a; color: #ddd;
      border: 1px solid #333; border-radius: 4px; padding: 8px 10px;
      font-family: inherit; font-size: 14px; }
    input[type=text]:focus { outline: none; border-color: #555; }
    button { background: #2563eb; color: white; border: 0; padding: 8px 16px;
      border-radius: 4px; font-family: inherit; cursor: pointer; }
    button:disabled { background: #444; cursor: not-allowed; }
    .hint { color: #666; font-size: 11px; padding: 0 20px 8px; }
  </style>
</head>
<body>
  <header>
    <strong>OpenComputer</strong>
    <span class="dot" id="conn-dot"></span>
    <span id="conn-label">connecting…</span>
    <span style="margin-left:auto;font-size:11px;color:#666">
      Phase 8.A — minimal dashboard MVP
    </span>
  </header>
  <main>
    <aside>
      <h2>Sessions</h2>
      <ul id="sessions"><li style="color:#555">(no sessions yet)</li></ul>
    </aside>
    <section class="chat">
      <div class="messages" id="messages">
        <div class="hint">Type a message and press Enter. The dashboard talks to the wire server at <code id="wire-url-readout"></code>.</div>
      </div>
      <form id="form" autocomplete="off">
        <input id="input" type="text" placeholder="Type your message…" disabled>
        <button id="send" type="submit" disabled>Send</button>
      </form>
    </section>
  </main>

<script>
// Wire URL is injected at request time by DashboardServer.
const WIRE_URL = "__WIRE_URL__";
document.getElementById("wire-url-readout").textContent = WIRE_URL;

const dot = document.getElementById("conn-dot");
const label = document.getElementById("conn-label");
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const form = document.getElementById("form");
const sessionsList = document.getElementById("sessions");

let ws = null;
let nextId = 1;
const pending = new Map();

function setConnected(state) {
  dot.className = "dot " + (state === "up" ? "up" : (state === "down" ? "down" : ""));
  label.textContent = state === "up" ? "connected"
                     : state === "down" ? "disconnected"
                     : "connecting…";
  input.disabled = state !== "up";
  sendBtn.disabled = state !== "up";
}

function call(method, params) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      reject(new Error("not connected"));
      return;
    }
    const id = nextId++;
    pending.set(id, { resolve, reject });
    ws.send(JSON.stringify({ jsonrpc: "2.0", id, method, params: params || {} }));
  });
}

function appendTurn(role, text) {
  const div = document.createElement("div");
  div.className = "turn";
  const r = document.createElement("div");
  r.className = "role " + role;
  r.textContent = role;
  const pre = document.createElement("pre");
  pre.textContent = text;
  div.appendChild(r);
  div.appendChild(pre);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function refreshSessions() {
  try {
    const result = await call("sessions.list", {});
    const sessions = (result && result.sessions) || [];
    sessionsList.innerHTML = "";
    if (!sessions.length) {
      const li = document.createElement("li");
      li.style.color = "#555";
      li.textContent = "(no sessions yet)";
      sessionsList.appendChild(li);
      return;
    }
    for (const s of sessions) {
      const li = document.createElement("li");
      li.textContent = (s.id || s.session_id || "?") + " — " + (s.message_count || 0) + " msgs";
      sessionsList.appendChild(li);
    }
  } catch (_e) {
    // Best-effort — don't crash the UI when sessions.list isn't ready.
  }
}

function connect() {
  setConnected("connecting");
  ws = new WebSocket(WIRE_URL);
  ws.onopen = async () => {
    setConnected("up");
    try { await call("hello", {}); } catch (_e) {}
    await refreshSessions();
  };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg && msg.id && pending.has(msg.id)) {
      const { resolve, reject } = pending.get(msg.id);
      pending.delete(msg.id);
      if (msg.error) reject(new Error(msg.error.message || "rpc error"));
      else resolve(msg.result);
    }
  };
  ws.onclose = () => {
    setConnected("down");
    // Reconnect after 2s — keeps the dashboard usable while you
    // restart the wire server.
    setTimeout(connect, 2000);
  };
  ws.onerror = () => setConnected("down");
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  appendTurn("user", text);
  input.value = "";
  try {
    const result = await call("chat", { user_message: text });
    appendTurn("assistant", (result && result.assistant_text) || "(no reply)");
    refreshSessions();
  } catch (err) {
    appendTurn("assistant", "[error: " + err.message + "]");
  }
});

connect();
</script>
</body>
</html>
