[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "opencomputer"
version = "0.0.1"
description = "Personal AI agent framework — plugin-first, self-improving, multi-channel"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "Saksham", email = "sakriarchit@gmail.com" },
]
keywords = ["ai", "agent", "llm", "claude", "anthropic", "openai", "chatbot"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
]

dependencies = [
  "anthropic>=0.40",
  "openai>=1.60",
  "pydantic>=2.9",
  "jinja2>=3.1",
  "aiosqlite>=0.20",
  "websockets>=13.0",
  "python-frontmatter>=1.1",
  "rich>=13.7",
  "typer>=0.12",
  "httpx>=0.27",
  "tenacity>=9.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.24",
  "ruff>=0.7",
  "black>=24.0",
  "mypy>=1.11",
]

[project.scripts]
opencomputer = "opencomputer.cli:main"
oc = "opencomputer.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["opencomputer", "plugin_sdk"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
