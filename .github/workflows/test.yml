name: Tests

on:
  push:
    branches: [main]
  # Fire on PRs targeting any branch so cross-branch / stacked PRs
  # (e.g. phase-12a → phase-11d → main) get checked too. Without this,
  # the workflow only ran on PRs against main and stacked PRs landed
  # untested.
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    defaults:
      run:
        working-directory: OpenComputer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: OpenComputer/pyproject.toml

      - name: Install Linux audio system deps
        # libportaudio2 = sounddevice runtime (voice-mode tests).
        # libsndfile1 = soundfile runtime (voice-mode tests).
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libsndfile1

      # Frontend builds run BEFORE pip install — pyproject's hatch
      # force-include is strict and `pip install -e` evaluates package_data
      # at install time, so the SPA + TUI artifact dirs must exist before
      # pip install or hatchling fails the editable build.
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            OpenComputer/ui-web/package-lock.json
            OpenComputer/ui-tui/package-lock.json
      - name: Build dashboard SPA
        run: ./scripts/build-dashboard.sh
      - name: Build Ink TUI
        run: ./scripts/build-tui.sh
      - name: Verify frontend artifacts
        run: |
          test -f opencomputer/dashboard/static/spa/index.html
          test -d opencomputer/dashboard/static/spa/assets
          test -f opencomputer/ui-tui/dist/entry.js

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,browser]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Eval regression gate
        # `oc eval regress all` exits non-zero if any baselined site's
        # accuracy drops past its per-site threshold. Rubric-graded sites
        # (require ANTHROPIC_API_KEY) are skipped if the secret is unset
        # so PRs from forks still pass on deterministic-graded sites.
        run: python -m opencomputer.cli eval regress all --cases-dir evals/cases --baselines-dir evals/baselines
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # Cross-platform verification of the introspection + ambient modules'
  # cross-platform claims. Public repo = unlimited free CI on all 3 OSes.
  test-cross-platform:
    name: introspection cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    defaults:
      run:
        working-directory: OpenComputer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: OpenComputer/pyproject.toml

      - name: Install Linux clipboard helper
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xclip

      - name: Install Linux PortAudio (for voice-mode sounddevice)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libportaudio2

      # Frontend artifact dirs must exist before pip install due to hatch
      # force-include strictness (same reason as the main pytest job).
      # We don't need to RUN the builds here — empty placeholder dirs
      # suffice because the cross-platform job doesn't import the SPA/TUI
      # modules; hatchling just needs the paths to exist for the wheel
      # metadata.
      - name: Stub frontend artifact dirs (cross-platform)
        shell: bash
        run: |
          mkdir -p opencomputer/dashboard/static/spa/assets
          touch opencomputer/dashboard/static/spa/index.html
          mkdir -p opencomputer/ui-tui/dist
          touch opencomputer/ui-tui/dist/entry.js

      - name: Install dependencies
        # Voice extras are needed for tests/test_voice_mode_*.py (the VAD
        # + audio_capture tests import webrtcvad / sounddevice directly).
        # ``voice-mlx`` is intentionally NOT installed in CI — the wheel is
        # macOS-Apple-Silicon only and would fail on the linux/windows
        # runners. The voice-mode plugin auto-detects backends, so absence
        # of mlx-whisper is fine.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,voice]"

      - name: Run introspection + AGPL guard + doctor + ambient + skill-evolution + service tests
        # Explicit `shell: bash` so glob expansion works uniformly across
        # all three OSes — PowerShell (Windows default) doesn't expand
        # `*.py` the way bash does and would pass the literal star to pytest.
        #
        # NOTE: voice-mode tests are NOT run here. webrtcvad's source
        # build + PortAudio + sounddevice teardown have known stability
        # issues on the macos-latest runner (segfault on test process exit).
        # Voice-mode tests still run on the main `pytest` job (ubuntu, both
        # Python versions), which is sufficient coverage. The cross-platform
        # claim is documented in extensions/voice-mode/README.md.
        #
        # Service tests cover the cross-platform always-on daemon backends
        # (systemd / launchd / schtasks). Subprocess-mocked tests run
        # uniformly on all three OSes; the new test_service_windows_e2e.py
        # adds REAL schtasks.exe shell-out, gated to Windows only — that
        # is what gives the Windows backend real-hardware verification.
        shell: bash
        run: pytest tests/test_introspection_*.py tests/test_no_agpl_imports.py tests/test_doctor_introspection_checks.py tests/test_ambient_*.py tests/test_skill_evolution_*.py tests/test_service_*.py tests/test_cli_service_commands.py tests/test_cli_install_daemon_flag.py tests/test_doctor_service_section.py tests/test_gateway_startup_ping.py -v --tb=short
