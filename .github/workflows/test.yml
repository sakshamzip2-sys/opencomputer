name: Tests

on:
  push:
    branches: [main]
  # Fire on PRs targeting any branch so cross-branch / stacked PRs
  # (e.g. phase-12a → phase-11d → main) get checked too. Without this,
  # the workflow only ran on PRs against main and stacked PRs landed
  # untested.
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    defaults:
      run:
        working-directory: OpenComputer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: OpenComputer/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # Cross-platform verification of the introspection + ambient modules'
  # cross-platform claims.
  #
  # NOTE: macOS and Windows runners are temporarily disabled because the
  # repo is currently PRIVATE and those runners count against the paid
  # tier (macOS=10x, Windows=2x the Linux rate). When the repo goes
  # public OR billing is configured, restore this list to:
  #   os: [ubuntu-latest, macos-latest, windows-latest]
  # The platform-specific code paths in the introspection + ambient
  # modules (osascript, pywin32, mss, etc.) still exist and have unit
  # tests covering them via mocked OS calls — they're just not exercised
  # on actual Mac/Windows runners until CI budget allows.
  test-cross-platform:
    name: introspection cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    defaults:
      run:
        working-directory: OpenComputer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: OpenComputer/pyproject.toml

      - name: Install Linux clipboard helper
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xclip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run introspection + AGPL guard + doctor + ambient tests
        # Explicit `shell: bash` so glob expansion works uniformly across
        # all three OSes — PowerShell (Windows default) doesn't expand
        # `*.py` the way bash does and would pass the literal star to pytest.
        shell: bash
        run: pytest tests/test_introspection_*.py tests/test_no_agpl_imports.py tests/test_doctor_introspection_checks.py tests/test_ambient_*.py -v --tb=short
