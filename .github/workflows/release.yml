name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    # Trusted publishing requires id-token write permission.
    # Configure the PyPI project at https://pypi.org/manage/account/publishing/
    # to trust this repo + workflow. No API token needed.
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: OpenComputer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Tag: $TAG_VERSION"
          echo "pyproject.toml: $PY_VERSION"
          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "::error::Git tag v$TAG_VERSION does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify the built artifacts import
        run: |
          python -m pip install dist/*.whl
          python -c "import opencomputer; print('installed:', opencomputer.__version__)"
          python -c "import plugin_sdk; print('sdk:', plugin_sdk.__version__)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: OpenComputer/dist
          # Requires PyPI trusted publisher config at:
          # https://pypi.org/manage/project/opencomputer/settings/publishing/
